name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: sh -n scripts/install-system.sh
      - run: sh -n src/linux_cache_guard/resources/linux-drop-caches
      - run: sh -n src/linux_cache_guard/resources/linux-cache-guard-admin
      - run: shellcheck scripts/install-system.sh src/linux_cache_guard/resources/linux-drop-caches src/linux_cache_guard/resources/linux-cache-guard-admin
      - run: systemd-analyze verify packaging/systemd/linux-cache-guard.service packaging/systemd/linux-cache-guard.timer packaging/systemd-user/linux-cache-guard-workload.service packaging/systemd-user/linux-cache-guard-workload.timer
      - run: visudo -cf packaging/sudoers/linux-cache-guard
      - run: sed 's|@AGENT_USER@|agent-user|' packaging/sudoers/linux-cache-guard-agent.template | visudo -cf -
