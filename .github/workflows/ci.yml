name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: sh -n scripts/install-system.sh
      - run: sh -n src/linux_cache_guard/resources/linux-drop-caches
      - run: sh -n src/linux_cache_guard/resources/linux-cache-guard-admin
      - run: visudo -cf packaging/sudoers/linux-cache-guard
      - run: sed 's|@AGENT_USER@|agent-user|' packaging/sudoers/linux-cache-guard-agent.template | visudo -cf -
